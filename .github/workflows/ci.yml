name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint & Type Check ──────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        run: |
          poetry config virtualenvs.in-project true
          poetry install

      - name: Ruff
        run: poetry run ruff check .

      - name: basedpyright
        run: poetry run basedpyright .

  # ── Unit / Integration Tests ───────────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        run: |
          poetry config virtualenvs.in-project true
          poetry install

      - name: Run tests
        env:
          # database.py reads DATABASE_URL at import time; testcontainers
          # overrides the actual connection — this placeholder satisfies the
          # import without connecting to anything.
          DATABASE_URL: postgresql://postgres:postgres@localhost/test
        run: |
          poetry run pytest \
            --cov=backend \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
        continue-on-error: true

  # ── Performance Tests ──────────────────────────────────────────────────────
  #
  # These tests are intentionally slow — they prove that async def + blocking
  # I/O serialises requests whereas sync def runs them in parallel.  They use
  # real ports (18001-18004) and a testcontainers PostgreSQL instance, both of
  # which are available on ubuntu-latest runners.
  perf:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        run: |
          poetry config virtualenvs.in-project true
          poetry install

      - name: Run performance tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost/test
        run: |
          poetry run pytest tests/perf/ -v -s -m perf
