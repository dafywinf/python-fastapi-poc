name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Frontend: Type Check, Build & Unit Tests ──────────────────────────────
  #
  # Runs independently of the Python jobs — no database needed.
  # Produces Allure results from Vitest for the same artifact store as e2e.
  frontend:
    name: Frontend (build + test)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Type-check & build
        run: npm run build

      - name: Run Vitest unit tests
        run: npm test

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-frontend
          path: frontend/allure-results/
          retention-days: 5

  # ── Backend: Lint & Type Check ─────────────────────────────────────────────
  backend-lint:
    name: Backend — Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-poetry

      - name: Ruff lint
        run: poetry run ruff check .

      - name: Ruff format
        run: poetry run ruff format --check .

      - name: basedpyright
        run: poetry run basedpyright .

  # ── Backend: Unit / Integration Tests ──────────────────────────────────────
  backend-test:
    name: Backend — Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: backend-lint
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-poetry

      - name: Run tests
        env:
          # database.py reads DATABASE_URL at import time; testcontainers
          # overrides the actual connection — this placeholder satisfies the
          # import without connecting to anything.
          DATABASE_URL: postgresql://postgres:postgres@localhost/test
        run: |
          poetry run pytest \
            --alluredir=allure-results \
            --clean-alluredir \
            --cov=backend \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-backend
          path: allure-results/
          retention-days: 5

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
        continue-on-error: true

  # ── Backend: Performance Tests ──────────────────────────────────────────────
  #
  # These tests are intentionally slow — they prove that async def + blocking
  # I/O serialises requests whereas sync def runs them in parallel.  They use
  # real ports (18001-18004) and a testcontainers PostgreSQL instance, both of
  # which are available on ubuntu-latest runners.
  backend-perf:
    name: Backend — Performance Tests
    runs-on: ubuntu-latest
    needs: backend-lint
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-poetry

      - name: Run performance tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost/test
        run: poetry run pytest tests/perf/ -v -s -m perf

  # ── E2E Tests ───────────────────────────────────────────────────────────────
  #
  # Full-stack: spins up the monitoring stack (PostgreSQL + Prometheus + Loki +
  # Grafana) via Docker Compose, starts the FastAPI app on the host, waits
  # for all services to pass their healthchecks, then runs the Playwright suite.
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: backend-lint
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-poetry

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(poetry run playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        run: poetry run playwright install --with-deps chromium

      - name: Set CI test credentials
        run: |
          echo "JWT_SECRET_KEY=ci-test-jwt-secret-key-not-for-production" >> $GITHUB_ENV
          HASH=$(poetry run python3 -c "import bcrypt; print(bcrypt.hashpw(b'admin', bcrypt.gensalt(rounds=4)).decode())")
          echo "ADMIN_PASSWORD_HASH=${HASH}" >> $GITHUB_ENV

      - name: Start platform services
        run: docker compose --profile monitoring up -d --wait

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sequences_db
        run: poetry run alembic upgrade head

      - name: Start FastAPI app
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sequences_db
          LOKI_URL: http://localhost:3100
        run: |
          nohup poetry run uvicorn backend.main:app --host 0.0.0.0 --port 8000 \
            > /tmp/uvicorn.log 2>&1 &
          echo "Waiting for app..."
          until curl -sf http://localhost:8000/health > /dev/null; do sleep 1; done
          echo "Seeding traffic so Prometheus scrapes a non-zero counter..."
          for i in $(seq 1 10); do curl -sf http://localhost:8000/health > /dev/null; done
          echo "Waiting for Prometheus to complete 2 scrape cycles (2 × 15s + buffer)..."
          sleep 35

      - name: Run e2e tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sequences_db
          LOKI_URL: http://localhost:3100
        run: |
          poetry run pytest tests/e2e/ -v -s -m e2e --alluredir=allure-results

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-e2e
          path: allure-results/
          retention-days: 5

      - name: Show app logs on failure
        if: failure()
        run: cat /tmp/uvicorn.log || true

  # ── Frontend E2E (Playwright) ───────────────────────────────────────────────
  #
  # Spins up PostgreSQL, starts the FastAPI backend, then runs the Playwright
  # suite against the Vite dev server (started automatically via webServer block
  # in playwright.config.ts when CI=true).
  frontend-e2e:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-lint, frontend]
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-poetry

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        working-directory: frontend
        run: echo "version=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-frontend-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Set CI test credentials
        run: |
          echo "JWT_SECRET_KEY=ci-test-jwt-secret-key-not-for-production" >> $GITHUB_ENV
          HASH=$(poetry run python3 -c "import bcrypt; print(bcrypt.hashpw(b'admin', bcrypt.gensalt(rounds=4)).decode())")
          echo "ADMIN_PASSWORD_HASH=${HASH}" >> $GITHUB_ENV

      - name: Start database and Redis
        run: docker compose up -d db redis --wait

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sequences_db
        run: poetry run alembic upgrade head

      - name: Start FastAPI app
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sequences_db
          ENABLE_PASSWORD_AUTH: 'true'
        run: |
          nohup poetry run uvicorn backend.main:app --host 0.0.0.0 --port 8000 \
            > /tmp/uvicorn.log 2>&1 &
          echo "Waiting for backend..."
          until curl -sf http://localhost:8000/health > /dev/null; do sleep 1; done

      - name: Run Playwright e2e tests
        working-directory: frontend
        env:
          CI: 'true'
        run: npm run e2e

      - name: Upload Allure results (e2e)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-frontend-e2e
          path: frontend/allure-results-e2e/
          retention-days: 5

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 5

      - name: Show backend logs on failure
        if: failure()
        run: cat /tmp/uvicorn.log || true
