name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint & Type Check ──────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-poetry

      - name: Ruff
        run: poetry run ruff check .

      - name: basedpyright
        run: poetry run basedpyright .

  # ── Unit / Integration Tests ───────────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-poetry

      - name: Run tests
        env:
          # database.py reads DATABASE_URL at import time; testcontainers
          # overrides the actual connection — this placeholder satisfies the
          # import without connecting to anything.
          DATABASE_URL: postgresql://postgres:postgres@localhost/test
        run: |
          poetry run pytest \
            --cov=backend \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
        continue-on-error: true

  # ── Performance Tests ──────────────────────────────────────────────────────
  #
  # These tests are intentionally slow — they prove that async def + blocking
  # I/O serialises requests whereas sync def runs them in parallel.  They use
  # real ports (18001-18004) and a testcontainers PostgreSQL instance, both of
  # which are available on ubuntu-latest runners.
  perf:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-poetry

      - name: Run performance tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost/test
        run: poetry run pytest tests/perf/ -v -s -m perf

  # ── E2E Tests ───────────────────────────────────────────────────────────────
  #
  # Spins up the full monitoring stack (PostgreSQL + Prometheus + Loki +
  # Grafana) via Docker Compose, starts the FastAPI app on the host, waits
  # for all services to pass their healthchecks, then runs the e2e suite.
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-poetry

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(poetry run playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        run: poetry run playwright install --with-deps chromium

      - name: Start platform services
        run: docker compose --profile monitoring up -d --wait

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sequences_db
        run: poetry run alembic upgrade head

      - name: Start FastAPI app
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sequences_db
          LOKI_URL: http://localhost:3100
        run: |
          nohup poetry run uvicorn backend.main:app --host 0.0.0.0 --port 8000 \
            > /tmp/uvicorn.log 2>&1 &
          echo "Waiting for app..."
          until curl -sf http://localhost:8000/health > /dev/null; do sleep 1; done
          echo "Seeding traffic so Prometheus scrapes a non-zero counter..."
          for i in $(seq 1 10); do curl -sf http://localhost:8000/health > /dev/null; done
          echo "Waiting for Prometheus to complete 2 scrape cycles (2 × 15s + buffer)..."
          sleep 35

      - name: Run e2e tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sequences_db
          LOKI_URL: http://localhost:3100
        run: |
          poetry run pytest tests/e2e/ -v -s -m e2e --alluredir=allure-results

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-e2e
          path: allure-results/
          retention-days: 5

      - name: Show app logs on failure
        if: failure()
        run: cat /tmp/uvicorn.log || true
