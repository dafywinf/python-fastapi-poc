name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint & Type Check ──────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        run: |
          poetry config virtualenvs.in-project true
          poetry install

      - name: Ruff
        run: poetry run ruff check .

      - name: basedpyright
        run: poetry run basedpyright .

  # ── Unit / Integration Tests ───────────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        run: |
          poetry config virtualenvs.in-project true
          poetry install

      - name: Run tests
        env:
          # database.py reads DATABASE_URL at import time; testcontainers
          # overrides the actual connection — this placeholder satisfies the
          # import without connecting to anything.
          DATABASE_URL: postgresql://postgres:postgres@localhost/test
        run: |
          poetry run pytest \
            --cov=backend \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
        continue-on-error: true

  # ── Performance Tests ──────────────────────────────────────────────────────
  #
  # These tests are intentionally slow — they prove that async def + blocking
  # I/O serialises requests whereas sync def runs them in parallel.  They use
  # real ports (18001-18004) and a testcontainers PostgreSQL instance, both of
  # which are available on ubuntu-latest runners.
  perf:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        run: |
          poetry config virtualenvs.in-project true
          poetry install

      - name: Run performance tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost/test
        run: |
          poetry run pytest tests/perf/ -v -s -m perf

  # ── E2E Tests ───────────────────────────────────────────────────────────────
  #
  # Spins up the full monitoring stack (PostgreSQL + Prometheus + Loki +
  # Grafana) via Docker Compose, starts the FastAPI app on the host, waits
  # for Prometheus to complete at least one scrape, then runs the e2e suite.
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        run: |
          poetry config virtualenvs.in-project true
          poetry install

      - name: Install Playwright browsers
        run: poetry run playwright install --with-deps chromium

      - name: Start platform services
        run: |
          docker compose up -d db
          docker compose --profile monitoring up -d

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for PostgreSQL..."
          until docker compose exec -T db pg_isready -U postgres -q; do sleep 1; done
          echo "Waiting for Loki..."
          until curl -sf http://localhost:3100/ready > /dev/null; do sleep 2; done
          echo "Waiting for Prometheus..."
          until curl -sf http://localhost:9090/-/ready > /dev/null; do sleep 2; done
          echo "Waiting for Grafana..."
          until curl -sf http://localhost:3000/api/health > /dev/null; do sleep 2; done

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sequences_db
        run: poetry run alembic upgrade head

      - name: Start FastAPI app
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sequences_db
          LOKI_URL: http://localhost:3100
        run: |
          nohup poetry run uvicorn backend.main:app --host 0.0.0.0 --port 8000 \
            > /tmp/uvicorn.log 2>&1 &
          echo "Waiting for app..."
          until curl -sf http://localhost:8000/health > /dev/null; do sleep 1; done
          echo "Waiting for Prometheus to complete first scrape (15s interval + buffer)..."
          sleep 20

      - name: Run e2e tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sequences_db
          LOKI_URL: http://localhost:3100
        run: |
          poetry run pytest tests/e2e/ -v -s -m e2e --alluredir=allure-results

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-e2e
          path: allure-results/

      - name: Show app logs on failure
        if: failure()
        run: cat /tmp/uvicorn.log || true
