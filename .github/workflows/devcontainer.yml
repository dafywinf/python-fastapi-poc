name: Devcontainer

on:
  push:
    branches: [main]
    paths:
      - '.devcontainer/**'
  pull_request:
    branches: [main]
    paths:
      - '.devcontainer/**'

jobs:
  validate:
    name: Validate devcontainer.json schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check devcontainer configuration with Dev Container CLI
        run: |
          npx -y @devcontainers/cli read-configuration --workspace-folder .

  build:
    name: Build devcontainer image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build .devcontainer/
